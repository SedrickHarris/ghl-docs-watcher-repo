name: Daily Docs Watch

# Skeleton workflow. The pipeline scripts are stubs — they run only in
# --dry-run mode and perform no network requests. This workflow does
# NOT fetch live HighLevel pages, does NOT write back to the repo, and
# does NOT consume any secrets.
#
# Before flipping any of that on:
#   1. Implement scripts/fetch_ghl_docs.py, parse_and_diff.py, write_updates.py.
#   2. Decide snapshot persistence (commit-back vs. artifact upload).
#   3. Promote permissions to contents: write only if commit-back is chosen.
#   4. Remove --dry-run from the step that should perform real work.

on:
  schedule:
    - cron: "0 13 * * *"   # 13:00 UTC daily
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: daily-docs-watch
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch docs (skeleton — no live fetch)
        run: python scripts/fetch_ghl_docs.py --dry-run

      - name: Parse and diff (skeleton)
        run: python scripts/parse_and_diff.py --dry-run

      - name: Write updates (skeleton)
        run: python scripts/write_updates.py --dry-run
